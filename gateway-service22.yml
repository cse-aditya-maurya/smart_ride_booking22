spring:
  application:
    name: gateway-service22

  cloud:
    gateway:
      server:
        webmvc:
          routes:

            - id: driver-service
              uri: lb://DRIVER-SERVICE22
              predicates:
                - Path=/drivers/**

            - id: ride-service
              uri: lb://RIDE-SERVICE22
              predicates:
                - Path=/rides/**

server:
  port: 9090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    hostname: 127.0.0.1


